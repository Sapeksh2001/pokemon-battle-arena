# Render Blueprint Configuration
# This file configures automatic deployment on Render.com

services:
  # WebSocket Server
  - type: web
    name: pokemon-battle-server
    env: node
    region: oregon  # Change to: oregon, ohio, frankfurt, singapore
    plan: free  # Options: free, starter ($7/mo), standard ($25/mo)
    
    # Build settings
    buildCommand: npm install
    startCommand: npm start
    
    # Health check endpoint
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: PORT
        value: 10000  # Render automatically assigns this
      
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app  # UPDATE THIS after Vercel deployment
        # This enables CORS for your Vercel frontend
      
    # Auto-deploy settings
    autoDeploy: true  # Deploy on git push
    
    # Scaling (free tier: 1 instance)
    numInstances: 1
    
    # Disk (free tier: ephemeral)
    # disk:
    #   name: pokemon-data
    #   sizeGB: 1
    #   mountPath: /data

# Database (Optional - uncomment to enable PostgreSQL)
# databases:
#   - name: pokemon-db
#     databaseName: pokemon_battle_arena
#     plan: free  # Free tier: 90 days, then $7/month
#     user: pokemon_user
